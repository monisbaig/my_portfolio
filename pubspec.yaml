name: my_portfolio
description: "My Portfolio"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.3.0
  url_launcher: ^6.3.2
  animated_text_kit: ^4.3.0
  go_router: ^17.3.0
  lottie: ^3.3.3
  gap: ^3.0.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/

flutter_assets:
  assets_path:
    - assets/images/
    - assets/lottie/

  output_path: lib/core/theme
  filename: assets.dart

  field_prefix:
    from: assets
    to: